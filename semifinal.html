<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestra Eternidad 💖</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --rosa-fuerte: #ff5c8a;
            --rosa-magico: #ff85a2;
            --rosa-claro: #ffcce6;
            --naranja-pastel: #ffeadb;
            --blanco: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(180deg, var(--naranja-pastel) 0%, var(--rosa-claro) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- DECORACIÓN DE FLORES FIJAS --- */
        .flower-corner {
            position: fixed;
            font-size: 4rem;
            z-index: 0;
            opacity: 0.6;
            pointer-events: none;
        }
        .top-left { top: -10px; left: -10px; transform: rotate(-15deg); }
        .top-right { top: -10px; right: -10px; transform: rotate(15deg); }
        .bottom-left { bottom: -10px; left: -10px; }
        .bottom-right { bottom: -10px; right: -10px; }

        /* --- CONTADOR GIGANTE --- */
        .hero-section {
            margin-top: 40px;
            text-align: center;
            z-index: 10;
            animation: fadeInDown 1.5s ease;
        }

        .hero-section h1 {
            font-family: 'Pacifico', cursive;
            color: var(--rosa-fuerte);
            font-size: clamp(2.5rem, 10vw, 4rem);
            margin-bottom: 10px;
            text-shadow: 4px 4px 0px white;
        }

        .reloj-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .tiempo-card {
            background: rgba(255, 255, 255, 0.9);
            width: 110px;
            height: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 25px;
            border: 5px solid white;
            box-shadow: 0 10px 25px rgba(255, 92, 138, 0.3);
            position: relative;
            overflow: hidden;
        }

        .tiempo-card::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 50%;
            background: rgba(255, 255, 255, 0.3);
        }

        .numero {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--rosa-fuerte);
            z-index: 2;
        }

        .etiqueta {
            font-size: 0.8rem;
            color: #ff85a2;
            text-transform: uppercase;
            font-weight: 700;
            z-index: 2;
        }

        /* --- CARTA LARGA --- */
        .carta-amor {
            background: white;
            width: 90%;
            max-width: 700px;
            padding: 50px;
            border-radius: 40px;
            border: 10px solid white;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
            margin-bottom: 50px;
            background-image: radial-gradient(#fff0f5 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .carta-amor i {
            color: var(--rosa-fuerte);
            font-size: 2rem;
            display: block;
            margin-bottom: 20px;
        }

        #texto-tipeado {
            font-size: 1.25rem;
            line-height: 2;
            color: #4a4a4a;
            font-weight: 600;
            text-align: left;
            white-space: pre-wrap;
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 20px;
            background: var(--rosa-fuerte);
            margin-left: 5px;
            animation: blink 0.8s infinite;
        }

        /* --- BOTÓN REINICIAR --- */
        .btn-restart {
            background: var(--rosa-fuerte);
            color: white;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            border: 4px solid white;
            box-shadow: 0 5px 15px var(--sombra);
            transition: 0.3s;
            margin-bottom: 60px;
            z-index: 10;
        }

        .btn-restart:hover { transform: scale(1.1); background: var(--rosa-magico); }

        /* --- LLUVIA DE FLORES --- */
        .falling-flower {
            position: fixed;
            top: -50px;
            z-index: 1;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        @keyframes blink { 50% { opacity: 0; } }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="flower-corner top-left">🌸</div>
    <div class="flower-corner top-right">🌺</div>
    <div class="flower-corner bottom-left">🌷</div>
    <div class="flower-corner bottom-right">🌹</div>

    <div class="hero-section">
        <h1>Nuestra Historia</h1>
        <p style="color: #666; font-weight: 700; margin-top: -10px;">Desde el 14 de marzo del 2025</p>
        
        <div class="reloj-grid">
            <div class="tiempo-card"><span class="numero" id="dias">00</span><span class="etiqueta">Días</span></div>
            <div class="tiempo-card"><span class="numero" id="horas">00</span><span class="etiqueta">Horas</span></div>
            <div class="tiempo-card"><span class="numero" id="minutos">00</span><span class="etiqueta">Minutos</span></div>
            <div class="tiempo-card"><span class="numero" id="segundos">00</span><span class="etiqueta">Segundos</span></div>
        </div>
    </div>

    <div class="carta-amor">
        <i class="fas fa-heart"></i>
        <div id="texto-tipeado"></div><span class="cursor"></span>
    </div>

    <a href="final.html" class="btn-restart">
        <i class="fas fa-redo"></i> Constelacion
    </a>

    <script>
        // --- 1. CONFIGURACIÓN DE FECHA ---
        const FECHA_INICIO = new Date(2025, 2, 14); // Marzo es el mes 2 (0=Ene, 1=Feb, 2=Mar)

        // --- 2. CARTA LARGA ---
        const mensaje = "Mi amor...\n\nHoy celebramos un tiempo maravilloso juntos, y quería decirte que eres el mejor regalo que la vida me ha dado. Desde aquel 14 de marzo, mi mundo se llenó de colores pastel y mi corazón de una alegría que no conocía.\n\nGracias por cada risa, por cada plan juntos, por los besos infinitos y por ser mi compañero de aventuras. No importa cuánto tiempo marque este reloj, cada segundo a tu lado es una joya que guardo en mi alma. \n\nPrometo que seguiremos sumando momentos, disfrutando de la vida y cumpliendo cada ticket de amor que hoy elegimos. \n\nTe amo hoy, mañana y siempre. Eres mi eternidad favorita. ❤️✨";

        // Lógica del Reloj
        function actualizarReloj() {
            const ahora = new Date();
            const diferencia = ahora - FECHA_INICIO;

            const d = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const h = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diferencia % (1000 * 60)) / 1000);

            document.getElementById('dias').innerText = d;
            document.getElementById('horas').innerText = h < 10 ? '0'+h : h;
            document.getElementById('minutos').innerText = m < 10 ? '0'+m : m;
            document.getElementById('segundos').innerText = s < 10 ? '0'+s : s;
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        // Lógica de Escritura
        let i = 0;
        const contenedor = document.getElementById("texto-tipeado");
        function escribir() {
            if (i < mensaje.length) {
                contenedor.innerHTML += mensaje.charAt(i);
                i++;
                // Desplazar hacia abajo mientras escribe
                window.scrollTo(0, document.body.scrollHeight);
                setTimeout(escribir, 50);
            }
        }
        setTimeout(escribir, 1500);

        // Lluvia de Flores y Corazones
        function crearLluvia() {
            const emojis = ['🌸', '🌺', '💖', '✨', '🌹', '🎀', '🌷'];
            setInterval(() => {
                const flower = document.createElement('div');
                flower.className = 'falling-flower';
                flower.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                flower.style.left = Math.random() * 100 + 'vw';
                flower.style.fontSize = Math.random() * 25 + 15 + 'px';
                flower.style.animationDuration = Math.random() * 3 + 4 + 's';
                flower.style.opacity = Math.random();
                document.body.appendChild(flower);
                setTimeout(() => flower.remove(), 7000);
            }, 300);
        }
        crearLluvia();
    </script>
</body>
</html>
